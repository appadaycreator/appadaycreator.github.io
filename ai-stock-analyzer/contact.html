<html lang="ja">
<head>

    <meta charset="UTF-8">
  <meta name="description" content="お問い合わせ - AI Stock Analyzerへのお問い合わせはこちら。ご質問・ご意見・ご要望をお気軽にどうぞ。">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/ai-stock-analyzer/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <title data-translate-key="contact_title">お問い合わせ - AI Stock Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TXQGZRF9"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <header>
        <nav>
            <div class="logo">AI Stock Analyzer</div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul id="menu">
                <li class="setting-item">
                    <span data-translate-key="setting_font_size">文字サイズ</span>
                    <div>
                        <button id="font-size-decrease">-</button>
                        <span id="font-size-display">中</span>
                        <button id="font-size-increase">+</button>
                    </div>
                </li>
                <li class="setting-item">
                    <span data-translate-key="setting_language">言語</span>
                    <select id="language-switcher">
                        <option value="ja">日本語</option>
                        <option value="en">English</option>
                    </select>
                </li>
            </ul>
        </nav>
    </header>
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

    <main>
        <section class="contact">
            <h1><span data-translate-key="contact.html_title">お問い合わせ</span></h1>
            <p>ご質問・ご要望などがございましたら、以下のフォームよりお気軽にお問い合わせください。</p>

            <form id="contactForm" action="/submit-contact" method="POST">
                <div class="form-group">
                    <label for="name">お名前 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">*</span></label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">件名 <span class="required">*</span></label>
                    <input type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <div class="form-group">
                    <button type="submit" class="submit-button">送信する</button>
                </div>
            </form>

            <div class="contact-info">
                <h2>その他のお問い合わせ方法</h2>
                <p>メールでのお問い合わせ：<a href="mailto:contact@ai-stock-analyzer.com">contact@ai-stock-analyzer.com</a></p>
                <p>受付時間：平日 9:00 - 18:00（土日祝日・年末年始を除く）</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 AI Stock Analyzer. All rights reserved.</p>
    </footer>

    <script src="settings.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const overlay = document.getElementById('sidebarOverlay');
            menu.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

</body>
</html>
