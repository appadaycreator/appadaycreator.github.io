<script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type": "Question", "name": "生命保険の見直しはいつ行うべきですか？", "acceptedAnswer": {"@type": "Answer", "text": "生命保険の見直しタイミングとして①結婚・出産（保障ニーズが増加）②子どもの独立（保障を減らせる）③住宅購入（団信で一部代替）④50歳以降（保障を縮小し老後資金重視に）が一般的な節目です。年1回の見直しも推奨されます。"}}, {"@type": "Question", "name": "生命保険は不要な場合もありますか？", "acceptedAnswer": {"@type": "Answer", "text": "独身・子どもなし・十分な貯蓄がある場合は、高額な生命保険は不要なケースがあります。生命保険の本来の目的は「自分が死亡した場合に家族が困る」リスクのカバーです。必要保障額を計算した上で適切な保障額に絞りましょう。"}}, {"@type": "Question", "name": "生命保険料控除の最大控除額はいくらですか？", "acceptedAnswer": {"@type": "Answer", "text": "2012年以降に加入した保険は「一般生命保険料控除」「介護医療保険料控除」「個人年金保険料控除」それぞれ所得税で最大4万円（計12万円）、住民税で最大2万8,000円（計7万円）が控除されます。"}}]}</script>
