    <meta name="color-scheme" content="light dark" />
    <script>
    const isDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
    const themeColor = isDark ? '#22d3ee' : '#818cf8';
    let metaTheme = document.querySelector('meta[name="theme-color"]');
    if (!metaTheme) {
      metaTheme = document.createElement('meta');
      metaTheme.name = 'theme-color';
      document.head.insertBefore(metaTheme, document.head.firstChild);
    }
    metaTheme.content = themeColor;
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      const newColor = e.matches ? '#22d3ee' : '#818cf8';
      document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.content = newColor);
    });
    </script>
