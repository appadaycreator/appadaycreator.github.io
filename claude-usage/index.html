<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude消費量管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }

#loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; color: #e2e8f0; font-family: -apple-system, sans-serif;
}
#loading h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
#loading h1 span { color: #f97316; }
#loading p { font-size: 13px; color: #64748b; margin-bottom: 20px; }
.spinner {
  width: 36px; height: 36px; border: 3px solid #334155;
  border-top-color: #f97316; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#offline {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; color: #e2e8f0; font-family: -apple-system, sans-serif; padding: 24px; text-align: center;
}
#offline h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #f87171; }
#offline p { font-size: 13px; color: #94a3b8; margin-bottom: 16px; line-height: 1.6; }
#offline .btn {
  display: inline-block; background: #3b82f6; color: #fff; text-decoration: none;
  padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600;
}
#offline .url-note { font-size: 11px; color: #475569; margin-top: 12px; }

iframe#dash { display: none; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div id="loading">
  <h1>🤖 <span>Claude</span>消費量管理</h1>
  <p>ダッシュボードに接続中...</p>
  <div class="spinner"></div>
</div>

<div id="offline">
  <h2>⚠️ ダッシュボードに接続できません</h2>
  <p>ローカルダッシュボードが起動していないか、トンネルURLが変わった可能性があります。</p>
  <!-- DASHBOARD_URL_START -->
  <a class="btn" id="dashBtn" href="https://pads-ist-ceiling-remarks.trycloudflare.com/?pw=30service" target="_blank" rel="noopener">直接開く →</a>
  <!-- DASHBOARD_URL_END -->
  <p class="url-note">URL: <code id="urlDisplay">https://pads-ist-ceiling-remarks.trycloudflare.com</code></p>
</div>

<iframe id="dash"></iframe>

<script>
const DASH_URL = 'https://pads-ist-ceiling-remarks.trycloudflare.com/?pw=30service';
const iframe = document.getElementById('dash');
const loading = document.getElementById('loading');
const offline = document.getElementById('offline');

iframe.src = DASH_URL;

const timer = setTimeout(() => {
  loading.style.display = 'none';
  offline.style.display = 'flex';
}, 10000);

iframe.onload = () => {
  clearTimeout(timer);
  loading.style.display = 'none';
  iframe.style.display = 'block';
};

iframe.onerror = () => {
  clearTimeout(timer);
  loading.style.display = 'none';
  offline.style.display = 'flex';
};
</script>
</body>
</html>
