<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude消費量管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0c1220;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1a2235;
    border: 1px solid #2d3748;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .desc { font-size: 14px; color: #94a3b8; margin-bottom: 32px; line-height: 1.6; }
  .btn {
    display: inline-block;
    background: #3b82f6;
    color: #fff;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s;
    margin-bottom: 12px;
    width: 100%;
  }
  .btn:hover { background: #2563eb; }
  .url-note {
    font-size: 12px;
    color: #64748b;
    margin-top: 16px;
    word-break: break-all;
  }
  .url-note code {
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
  }
  .offline {
    display: none;
    background: #7f1d1d;
    border: 1px solid #991b1b;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #fca5a5;
    margin-top: 16px;
    text-align: left;
  }
  .back { margin-top: 24px; }
  .back a { color: #64748b; font-size: 13px; text-decoration: none; }
  .back a:hover { color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🤖</div>
  <h1>Claude消費量管理</h1>
  <p class="desc">
    Claude API のトークン消費量・コストをリアルタイムでモニタリング。<br>
    ローカルダッシュボードへ接続します。
  </p>

  <!-- DASHBOARD_URL_START -->
  <a class="btn" id="dashBtn" href="https://inserted-luis-skirts-theology.trycloudflare.com/?pw=30service" target="_blank">
    ダッシュボードを開く →
  </a>
  <!-- DASHBOARD_URL_END -->

  <div class="offline" id="offlineMsg">
    ⚠️ ダッシュボードが起動していない可能性があります。<br>
    ローカルで <code>python3 scripts/claude_usage_dashboard.py</code> を実行してください。
  </div>

  <p class="url-note" id="urlNote">
    接続先: <code id="urlDisplay">https://inserted-luis-skirts-theology.trycloudflare.com</code>
  </p>

  <div class="back">
    <a href="https://appadaycreator.com/my-hub/?p=techbrace2026">← マイツールに戻る</a>
  </div>
</div>

<script>
  const btn = document.getElementById('dashBtn');
  const urlDisplay = document.getElementById('urlDisplay');
  const offlineMsg = document.getElementById('offlineMsg');

  // ダッシュボードの疎通確認
  async function checkDashboard() {
    const url = btn.href;
    try {
      const res = await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(5000) });
      // no-cors でも fetch 自体が成功すればサーバーは生きている
    } catch {
      offlineMsg.style.display = 'block';
    }
  }

  checkDashboard();
</script>
</body>
</html>
