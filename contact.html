<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | AppADayCreator</title>
    <link rel="canonical" href="https://appadaycreator.github.io/contact.html">
    <meta name="description" content="AppADayCreatorへのお問い合わせ。ご意見・ご要望・不具合報告をお送りください。">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8427583028015858" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <header class="bg-indigo-700 text-white py-6 text-center">
        <h1 class="text-2xl font-bold"><a href="index.html" class="hover:underline">AppADayCreator</a></h1>
    </header>
    <nav class="bg-white shadow-sm py-3 px-4 flex gap-4 text-sm flex-wrap justify-center">
        <a href="index.html" class="text-indigo-600 hover:underline">ホーム</a>
        <a href="about.html" class="text-indigo-600 hover:underline">運営者情報</a>
        <a href="privacy-policy.html" class="text-indigo-600 hover:underline">プライバシーポリシー</a>
        <a href="contact.html" class="text-indigo-600 font-bold">お問い合わせ</a>
    </nav>
    <main class="max-w-2xl mx-auto px-4 py-10">
        <div class="bg-white rounded-2xl shadow p-8">
            <h2 class="text-2xl font-bold mb-4">お問い合わせ</h2>
            <p class="text-gray-600 mb-6">AppADayCreatorのサービスに関するご意見・ご要望・不具合報告をお送りいただけます。通常2〜5営業日以内にご回答いたします。</p>

            <div id="success" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 mb-6 text-green-700 font-semibold">✅ お問い合わせを受け付けました。ありがとうございます。</div>

            <form id="form" action="https://formspree.io/f/xdkodpqg" method="POST" class="space-y-5">
                <input type="hidden" name="_subject" value="[AppADayCreator] お問い合わせ">
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">お名前 <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required placeholder="山田 太郎" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-indigo-400">
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" name="email" required placeholder="example@email.com" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-indigo-400">
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">対象サービス</label>
                    <input type="text" name="service" placeholder="例: FIRE計算機、子供の習い事診断など" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-indigo-400">
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">お問い合わせ内容 <span class="text-red-500">*</span></label>
                    <textarea name="message" required rows="5" placeholder="ご質問・ご要望・不具合の詳細をご記入ください" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-indigo-400 resize-vertical"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-base hover:bg-indigo-700 transition-colors">送信する</button>
                <p class="text-xs text-gray-400">直接メール: tokunaga.g@gmail.com</p>
            </form>
        </div>
    </main>
    <footer class="bg-gray-800 text-white py-6 mt-10 text-center text-sm">
        <p class="mb-2">© 2024 AppADayCreator</p>
        <div class="flex gap-4 justify-center flex-wrap">
            <a href="index.html" class="hover:underline">ホーム</a>
            <a href="about.html" class="hover:underline">運営者情報</a>
            <a href="privacy-policy.html" class="hover:underline">プライバシーポリシー</a>
            <a href="contact.html" class="hover:underline">お問い合わせ</a>
        </div>
    </footer>
    <script>
    document.getElementById('form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.textContent = '送信中...'; btn.disabled = true;
        try {
            const res = await fetch(this.action, {method:'POST', body: new FormData(this), headers:{Accept:'application/json'}});
            if (res.ok) { this.style.display='none'; document.getElementById('success').classList.remove('hidden'); }
            else { btn.textContent='送信する'; btn.disabled=false; alert('送信に失敗しました。メールでご連絡ください。'); }
        } catch { btn.textContent='送信する'; btn.disabled=false; }
    });
    </script>
</body>
</html>
