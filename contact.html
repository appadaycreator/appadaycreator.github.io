<body>
    <header class="bg-indigo-700 text-white py-6 text-center">
        <h1 class="text-2xl font-bold"><a href="/" class="hover:underline">AppADayCreator</a></h1>
    </header>
    <nav class="bg-white shadow-sm py-3 px-4 flex gap-4 text-sm flex-wrap justify-center">
        <a href="/" class="text-indigo-600 hover:underline">ホーム</a>
        <a href="/about.html" class="text-indigo-600 hover:underline">運営者情報</a>

        <a href="/contact.html" class="text-indigo-600 font-bold">お問い合わせ</a>
    </nav>
    <main class="max-w-2xl mx-auto px-4 py-10">
        <div class="bg-white rounded-2xl shadow p-8">
            <h2 class="text-2xl font-bold mb-4">お問い合わせ</h2>
            <p class="text-gray-600 mb-2">AppADayCreatorのサービスに関するご意見・ご要望・不具合報告をお送りいただけます。</p>
            <p class="text-gray-600 mb-6">📩 <strong>無料・登録不要</strong>でお問い合わせいただけます。通常<strong>2営業日以内</strong>にご返信します。</p>

            <div id="success" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 mb-6 text-green-700 font-semibold">✅ お問い合わせを受け付けました。2営業日以内にご返信いたします。</div>

            <form id="form" action="https://formsubmit.co/appadaycreator@gmail.com" method="POST" class="space-y-5">
                <input type="hidden" name="_subject" value="[AppADayCreator] お問い合わせ">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://appadaycreator.com/contact.html?sent=1">
                <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off">
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">お名前 <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required placeholder="山田 太郎" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base">
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" name="email" required placeholder="example@email.com" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base">
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-gray-700">お問い合わせ内容 <span class="text-red-500">*</span></label>
                    <textarea name="message" required rows="5" placeholder="ご質問・ご要望・不具合の詳細をご記入ください" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-base resize-vertical"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-base hover:bg-indigo-700 transition-colors">送信する（無料）</button>
                <p class="text-xs text-gray-400 text-center">直接メール: <a href="mailto:appadaycreator@gmail.com" class="underline">appadaycreator@gmail.com</a></p>
            </form>
        </div>
    </main>
    <footer class="bg-gray-800 text-white py-6 mt-10 text-center text-sm">
        <p class="mb-2">© 2026 AppADayCreator</p>
        <div class="flex gap-4 justify-center flex-wrap">
            <a href="/" class="hover:underline">ホーム</a>
            <a href="/about.html" class="hover:underline">運営者情報</a>
            <a href="/privacy-policy.html" class="hover:underline">プライバシーポリシー</a>
            <a href="/contact.html" class="hover:underline">お問い合わせ</a>
        </div>
    </footer>
    <script>
    if (location.search.includes('sent=1')) {
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').classList.remove('hidden');
    }
    </script>
