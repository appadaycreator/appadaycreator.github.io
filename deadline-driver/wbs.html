    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const themeToggle = document.getElementById('theme-toggle');
        const langToggle = document.getElementById('lang-toggle');
        const currentLang = document.getElementById('current-lang');
        const timerToggle = document.getElementById('timer-toggle');
        const timerDisplay = document.getElementById('timer-display');
        const timerProgress = document.getElementById('timer-progress');
        const nameInput = document.getElementById('task-name');
        const startInput = document.getElementById('task-start');
        const endInput = document.getElementById('task-end');
        const noteInput = document.getElementById('task-note');
        const categorySelect = document.getElementById('category-select');
        const addBtn = document.getElementById('add-task');
        const tasksBody = document.getElementById('tasks-body');
        const filterSelect = document.getElementById('filter-select');
        const categoryFilter = document.getElementById('category-filter');
        const toggleComplete = document.getElementById('toggle-complete');
        const parentSelect = document.getElementById('parent-select');
        const validationMessage = document.getElementById("validation-message");

        const todayStr = new Date().toISOString().split('T')[0];
        startInput.value = todayStr;
        endInput.value = todayStr;

        let tasks = JSON.parse(localStorage.getItem('wbsTasks') || '[]');
        if (!Array.isArray(tasks)) tasks = [];
        let categories = JSON.parse(localStorage.getItem('taskCategories') || '[]');
        if (!Array.isArray(categories)) categories = [];
        const ensureChildren = (arr) => {
            arr.forEach(t => {
                if (!t || typeof t !== 'object') return;
                if (!Array.isArray(t.children)) t.children = [];
                if (t.done === undefined) t.done = false;
                if (!t.note) t.note = '';
                if (!t.categoryId) t.categoryId = '';
                ensureChildren(t.children);
            });
        };
        ensureChildren(tasks);
        let timerInterval = null;
        let timeLeft = 1500;

        const saveTasks = () => localStorage.setItem('wbsTasks', JSON.stringify(tasks));

        const updateTimer = () => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const progress = (1500 - timeLeft) / 1500;
            const offset = 125.6 * (1 - progress);
            timerProgress.style.strokeDashoffset = offset;
        };

        const flattenTasks = (arr, prefix = '', depth = 0, result = []) => {
            arr.forEach((t, idx) => {
                if (!t || typeof t !== 'object') return;
                const path = prefix ? `${prefix}-${idx}` : `${idx}`;
                result.push({ task: t, path, depth });
                if (Array.isArray(t.children) && t.children.length) {
                    flattenTasks(t.children, path, depth + 1, result);
                }
            });
            return result;
        };

        const weekendHighlightPlugin = {
            id: 'weekendHighlight',
            afterDatasetsDraw(chart, args, opts) {
                const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                if (!opts || !opts.minDate) return;
                const width = x.getPixelForValue(1) - x.getPixelForValue(0);
                ctx.save();
                for (let i = Math.ceil(x.min); i <= x.max; i++) {
                    const d = new Date(opts.minDate);
                    d.setDate(d.getDate() + i);
                    const day = d.getDay();
                    if (day === 0 || day === 6) {
                        const xPos = x.getPixelForValue(i);
                        ctx.fillStyle = 'rgba(0,0,0,0.05)';
                        ctx.fillRect(xPos, top, width, bottom - top);
                    }
                }
                ctx.restore();
            }
        };

       const renderFilterOptions = () => {
           if (!filterSelect) return;
           const current = filterSelect.value;
           const options = tasks.map((t, idx) => {
               if (!t || typeof t !== 'object') return '';
               const name = t.name || `タスク${idx + 1}`;
               return `<option value="${idx}">${name}</option>`;
           }).join('');
           filterSelect.innerHTML = '<option value="">全て</option>' + options;
           filterSelect.value = current;
       };

      const renderParentOptions = () => {
          if (!parentSelect) return;
          const current = parentSelect.value;
          const flat = flattenTasks(tasks);
          parentSelect.innerHTML = '<option value="">(親なし)</option>' +
              flat.map(({task, path, depth}) => `<option value="${path}">${'&nbsp;'.repeat(depth*2)}${task.name}</option>`).join('');
          parentSelect.value = current;
      };

      const renderCategoryOptions = () => {
          if (!categorySelect) return;
          const current = categorySelect.value;
          categorySelect.innerHTML = '<option value="">(カテゴリなし)</option>' +
              categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          categorySelect.value = current;
      };

      const renderCategoryFilterOptions = () => {
          if (!categoryFilter) return;
          const current = categoryFilter.value;
          categoryFilter.innerHTML = '<option value="">全て</option>' +
              categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          categoryFilter.value = current;
      };

        const renderTasks = () => {
            tasksBody.innerHTML = '';
            const selected = filterSelect ? filterSelect.value : '';
            let viewList;
            if (selected === '') {
                viewList = flattenTasks(tasks);
            } else {
                const idx = parseInt(selected, 10);
                const root = tasks[idx];
                viewList = root ? flattenTasks([root]) : [];
            }
            if (toggleComplete && !toggleComplete.checked) {
                viewList = viewList.filter(v => !v.task.done);
            }
            const selectedCat = categoryFilter ? categoryFilter.value : '';
            if (selectedCat !== '') {
                viewList = viewList.filter(v => v.task.categoryId == selectedCat);
            }
            viewList.forEach(({ task, path, depth }) => {
                const tr = document.createElement('tr');
                tr.setAttribute('data-path', path);
                const cat = categories.find(c => c.id == task.categoryId);
                tr.innerHTML = `
                    <td class="border px-2 py-1 task-name cursor-pointer ${task.done ? "line-through text-gray-400" : ""}" style="padding-left:${depth * 20}px">${task.name}</td>
                    <td class="border px-2 py-1">${task.start}</td>
                    <td class="border px-2 py-1">${task.end}</td>
                    <td class="border px-2 py-1">${cat ? cat.name : ''}</td>
                    <td class="border px-2 py-1">${task.note || ''}</td>
                    <td class="border px-2 py-1 text-center"><input type="checkbox" class="task-done" data-path="${path}" ${task.done ? "checked" : ""}></td>
                    <td class="border px-2 py-1 text-center"><button data-path="${path}" class="add-subtask text-blue-600">＋</button></td>
                    <td class="border px-2 py-1 text-center"><button data-path="${path}" class="delete-task text-red-600">×</button></td>
                `;
                tasksBody.appendChild(tr);
            });
            renderFilterOptions();
            renderParentOptions();
            renderCategoryOptions();
            renderCategoryFilterOptions();
            updateChart();
        };

        const updateChart = () => {
            if (typeof Chart === 'undefined') return;
            if (window.ganttChart) window.ganttChart.destroy();
            const selected = filterSelect ? filterSelect.value : '';
            let viewTasks;
            if (selected === '') {
                viewTasks = flattenTasks(tasks);
            } else {
                const idx = parseInt(selected, 10);
                const rootTask = tasks[idx];
                viewTasks = rootTask ? flattenTasks([rootTask]) : [];
            }
            if (toggleComplete && !toggleComplete.checked) {
                viewTasks = viewTasks.filter(v => !v.task.done);
            }
            const selectedCat = categoryFilter ? categoryFilter.value : '';
            if (selectedCat !== '') {
                viewTasks = viewTasks.filter(v => v.task.categoryId == selectedCat);
            }
            if (viewTasks.length === 0) return;
            const ctx = document.getElementById('gantt-chart').getContext('2d');
            const startDates = viewTasks.map(t => new Date(t.task.start));
            const endDates = viewTasks.map(t => new Date(t.task.end));
            const minDate = new Date(Math.min(...startDates));
            const maxDate = new Date(Math.max(...endDates));
            const labels = viewTasks.map(t => {
                const name = t.task.name.length > 20 ? t.task.name.substring(0,20)+'...' : t.task.name;
                return ' '.repeat(t.depth * 2) + name;
            });
            const offsets = viewTasks.map(t => (new Date(t.task.start) - minDate) / 86400000);
            const durations = viewTasks.map(t => (new Date(t.task.end) - new Date(t.task.start)) / 86400000 + 1);
            const totalDays = Math.floor((maxDate - minDate) / 86400000) + 1;
            // ガントチャートの横軸ラベルは月/日形式で表示する
            const formatDate = (d) => {
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${m}/${day}`;
            };
            window.ganttChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'offset', data: offsets, backgroundColor: 'rgba(0,0,0,0)' },
                        { label: "期間", data: durations, backgroundColor: viewTasks.map(t => t.task.done ? "rgba(16,185,129,0.8)" : "rgba(59,130,246,0.8)") }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false },
                        weekendHighlight: { minDate }
                    },
                    responsive: true,
                scales: {
                    x: {
                        stacked: true,
                            beginAtZero: true,
                            max: totalDays,
                            ticks: {
                                stepSize: 1,
                                callback: (value) => {
                                    const d = new Date(minDate);
                                    d.setDate(d.getDate() + value);
                                    return formatDate(d);
                                }
                            }
                        },
                        y: { stacked: true }
                    }
                },
                plugins: [weekendHighlightPlugin]
            });
        };
        const showValidation = (msg) => {
            validationMessage.textContent = msg;
            validationMessage.classList.remove("hidden");
            setTimeout(() => validationMessage.classList.add("hidden"), 3000);
        };

        addBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            validationMessage.classList.add("hidden");
            if (!name) { showValidation("タスク名を入力してください"); return; }
            if (!startInput.value || !endInput.value) { showValidation("開始日と終了日は必須です"); return; }
            const newTask = { done:false, name, start: startInput.value, end: endInput.value, note: noteInput.value.trim(), categoryId: categorySelect ? categorySelect.value : '', children: [] };
            const parentPathStr = parentSelect ? parentSelect.value : '';
            if (parentPathStr === '') {
                tasks.push(newTask);
            } else {
                const parent = getTaskByPath(parentPathStr.split('-').map(n => parseInt(n, 10)));
                if (parent) parent.children.push(newTask);
                else tasks.push(newTask);
            }
            saveTasks();
            nameInput.value = '';
            parentSelect.value = '';
            if (categorySelect) categorySelect.value = '';
            startInput.value = todayStr;
            endInput.value = todayStr;
            noteInput.value = '';
            renderTasks();
        });

        const getTaskByPath = (pathArr) => {
            let cur = tasks;
            for (let i = 0; i < pathArr.length; i++) {
                if (i === pathArr.length - 1) return cur[pathArr[i]];
                cur = cur[pathArr[i]].children;
            }
        };
        const removeTaskByPath = (pathArr) => {
            let cur = tasks;
            for (let i = 0; i < pathArr.length - 1; i++) {
                cur = cur[pathArr[i]].children;
            }
            cur.splice(pathArr[pathArr.length - 1], 1);
        };

        const editDialog = document.getElementById('edit-dialog');
        const editName = document.getElementById('edit-name');
        const editStart = document.getElementById('edit-start');
        const editEnd = document.getElementById('edit-end');
        const editCategory = document.getElementById('edit-category');
        const editNote = document.getElementById('edit-note');
        const editSave = document.getElementById('edit-save');
        const editCancel = document.getElementById('edit-cancel');
        const dialogTitle = document.getElementById('dialog-title');
        let editPath = null;
        let parentPath = null;
        let editMode = 'edit';

        tasksBody.addEventListener('click', (e) => {
            if (e.target.classList.contains('add-subtask')) {
                parentPath = e.target.getAttribute('data-path').split('-').map(n => parseInt(n, 10));
                const parent = getTaskByPath(parentPath);
                editMode = 'subtask';
                dialogTitle.textContent = 'サブタスク追加';
                editName.value = '';
                editStart.value = parent.start;
                editEnd.value = parent.end;
                if (editCategory) editCategory.value = parent.categoryId || '';
                editNote.value = '';
                if (editDialog.showModal) editDialog.showModal();
            } else if (e.target.classList.contains('task-name')) {
                const tr = e.target.closest('tr');
                editPath = tr.getAttribute('data-path').split('-').map(n => parseInt(n, 10));
                const task = getTaskByPath(editPath);
                editMode = 'edit';
                dialogTitle.textContent = 'タスク編集';
                editName.value = task.name;
                editStart.value = task.start;
                editEnd.value = task.end;
                if (editCategory) editCategory.value = task.categoryId || '';
                editNote.value = task.note || '';
                if (editDialog.showModal) editDialog.showModal();
            } else if (e.target.classList.contains("task-done")) {
                const path = e.target.getAttribute("data-path").split("-").map(n => parseInt(n, 10));
                const task = getTaskByPath(path);
                task.done = e.target.checked;
                saveTasks();
                renderTasks();
            } else if (e.target.classList.contains('delete-task')) {
                const path = e.target.getAttribute('data-path').split('-').map(n => parseInt(n, 10));
                removeTaskByPath(path);
                saveTasks();
                renderTasks();
            }
        });

        editSave.addEventListener('click', () => {
            if (!editName.value.trim()) { showValidation('タスク名を入力してください'); return; }
            if (!editStart.value || !editEnd.value) { showValidation('開始日と終了日は必須です'); return; }
            if (editMode === 'edit') {
                const task = getTaskByPath(editPath);
                task.name = editName.value.trim();
                task.start = editStart.value;
                task.end = editEnd.value;
                task.categoryId = editCategory ? editCategory.value : '';
                task.note = editNote.value.trim();
            } else if (editMode === 'subtask') {
                const parent = getTaskByPath(parentPath);
                parent.children.push({ done:false, name: editName.value.trim(), start: editStart.value, end: editEnd.value, categoryId: editCategory ? editCategory.value : '', note: editNote.value.trim(), children: [] });
            }
            saveTasks();
            renderTasks();
            editDialog.close();
        });
        const resetDialog = () => {
            editPath = null;
            parentPath = null;
            editMode = 'edit';
            if (editNote) editNote.value = '';
            if (editCategory) editCategory.value = '';
        };
        editCancel.addEventListener('click', () => { editDialog.close(); resetDialog(); });
        editDialog.addEventListener('close', resetDialog);

        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
        const fontSizeSelect = document.getElementById('font-size-select');
        const applyFontSize = (size) => {
            const map = { xs: '12px', sm: '14px', base: '16px', lg: '18px' };
            document.documentElement.style.fontSize = map[size] || '16px';
        };
        if (fontSizeSelect) {
            const saved = localStorage.getItem('fontSize') || 'base';
            fontSizeSelect.value = saved;
            applyFontSize(saved);
            fontSizeSelect.addEventListener('change', () => {
                const val = fontSizeSelect.value;
                localStorage.setItem('fontSize', val);
                applyFontSize(val);
            });
        }
        if (langToggle) {
            langToggle.addEventListener('click', () => {
                const isJa = currentLang.textContent === 'JP';
                currentLang.textContent = isJa ? 'EN' : 'JP';
            });
        }
        if (timerToggle) {
            timerToggle.addEventListener('click', () => {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerToggle.innerHTML = '▶';
                } else {
                    timerInterval = setInterval(() => {
                        timeLeft--;
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval);
                            timerInterval = null;
                            timeLeft = 1500;
                        }
                        updateTimer();
                    }, 1000);
                    timerToggle.innerHTML = '⏸';
                }
            });
        }

        updateTimer();
        renderCategoryOptions();
        renderCategoryFilterOptions();
        renderTasks();
        new Sortable(tasksBody, {
            animation: 100,
            onEnd: (evt) => {
                const fromPath = evt.item.getAttribute('data-path').split('-').map(n => parseInt(n, 10));
                const parentArr = fromPath.length === 1 ? tasks : getTaskByPath(fromPath.slice(0, -1)).children;
                const parentKey = fromPath.slice(0, -1).join('-');
                const rows = Array.from(tasksBody.children).filter(r => {
                    const p = r.getAttribute('data-path').split('-');
                    return p.length === fromPath.length && p.slice(0, -1).join('-') === parentKey;
                });
                const indices = rows.map(r => parseInt(r.getAttribute('data-path').split('-').pop(), 10));
                const ordered = indices.map(i => parentArr[i]);
                const idxSet = new Set(indices);
                let j = 0;
                for (let i = 0; i < parentArr.length; i++) {
                    if (idxSet.has(i)) {
                        parentArr[i] = ordered[j++];
                    }
                }
                saveTasks();
                renderTasks();
            }
        });
        if (filterSelect) filterSelect.addEventListener('change', renderTasks);
        if (categoryFilter) categoryFilter.addEventListener('change', renderTasks);
        if (toggleComplete) toggleComplete.addEventListener('change', renderTasks);

        const exportBtn = document.getElementById('export-tasks');
        const exportTasks = () => {
            const data = { tasks, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wbs-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };
        if (exportBtn) exportBtn.addEventListener('click', exportTasks);

        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const sideMenu = document.getElementById('side-menu');
        const menuOverlay = document.getElementById('menu-overlay');

        const openMenu = () => {
            sideMenu.classList.remove('translate-x-full');
            menuOverlay.classList.remove('hidden');
        };
        const closeMenu = () => {
            sideMenu.classList.add('translate-x-full');
            menuOverlay.classList.add('hidden');
        };

        menuToggle.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        menuOverlay.addEventListener('click', closeMenu);
    });
    </script>

    <script src="footer.js"></script>
</body>
</html>
