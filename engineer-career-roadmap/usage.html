<h1>📋 使い方</h1><h2>診断タブ</h2><p>現職・ITスキルレベル・希望職種・目標期間・1日の学習時間を入力して「ロードマップを生成する」ボタンを押してください。</p><h2>ロードマップタブ</h2><p>診断後に自動生成されます。フェーズ別の学習内容・必要スキル・学習リソースが確認できます。</p><h2>年収タブ</h2><p>職種・現在の年収を選ぶと、転職後〜シニアまでの年収推移が表示されます。</p><h2>エージェントタブ</h2><p>IT転職エージェントの特徴比較と関連ツールへのリンクがあります。</p>
