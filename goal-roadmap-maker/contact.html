<body>

    <header>
        <nav>
            <a href="lp.html"><img loading="lazy" src="images/logo.svg" alt="Goal Roadmap Maker" class="logo"></a>
            <ul>
                <li><a href="lp.html">ホーム</a></li>
                <li><a href="index.html">アプリ</a></li>
                <li><a href="how-to-use.html">使い方</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>お問い合わせ</h1>
        <p>ご質問・ご要望・不具合報告など、お気軽にお問い合わせください。</p>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">お名前 <span class="required">*</span></label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="category">お問い合わせ種別 <span class="required">*</span></label>
                <select id="category" name="category" required>
                    <option value="">選択してください</option>
                    <option value="usage">使い方について</option>
                    <option value="bug">不具合報告</option>
                    <option value="feature">機能要望</option>
                    <option value="other">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">お問い合わせ内容 <span class="required">*</span></label>
                <textarea id="message" name="message" rows="8" required></textarea>
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="privacy" name="privacy" required>
                    <a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意する
                </label>
            </div>

            <button type="submit" class="submit-button">送信する</button>
        </form>

        <div id="formMessage" class="form-message" style="display: none;"></div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="terms.html">利用規約</a>
            <a href="privacy.html">プライバシーポリシー</a>
            <a href="contact.html">お問い合わせ</a>
        </div>
        <p>&copy; 2026 Goal Roadmap Maker. All rights reserved.</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // フォームデータの取得
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                category: document.getElementById('category').value,
                message: document.getElementById('message').value
            };
            
            // ここで実際の送信処理を行う（現在はローカルストレージに保存）
            const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
            contacts.push({
                ...formData,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('contacts', JSON.stringify(contacts));
            
            // 成功メッセージの表示
            const messageDiv = document.getElementById('formMessage');
            messageDiv.textContent = 'お問い合わせを受け付けました。ご連絡ありがとうございます。';
            messageDiv.className = 'form-message success';
            messageDiv.style.display = 'block';
            
            // フォームをリセット
            this.reset();
            
            // メッセージを5秒後に非表示
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
