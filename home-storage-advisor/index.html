let cur = 0, scores = { space: 0, stuff: 0 }, lastResultKey = null;

function saveHistory(resultKey) {
  const history = JSON.parse(localStorage.getItem('quiz_history') || '[]');
  history.unshift({ key: resultKey, title: RESULTS[resultKey].title, emoji: RESULTS[resultKey].emoji, timestamp: new Date().toLocaleString('ja-JP') });
  if (history.length > 5) history.pop();
  localStorage.setItem('quiz_history', JSON.stringify(history));
  localStorage.setItem('last_result', resultKey);
}

function loadLastResult() {
  const lastKey = localStorage.getItem('last_result');
  if (lastKey && RESULTS[lastKey]) {
    const r = RESULTS[lastKey];
    document.getElementById('prev-result-text').textContent = r.emoji + ' ' + r.title;
    document.getElementById('prev-result').style.display = 'block';
  }
}

function initOnLoad() {
  loadLastResult();
  document.getElementById('result').classList.remove('show');
}

function startQuiz() {
  cur = 0; scores = { space: 0, stuff: 0 };
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result').classList.remove('show');
  document.getElementById('q-total').textContent = QUESTIONS.length;
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[cur];
  document.getElementById('q-current').textContent = cur + 1;
  document.getElementById('progress').style.width = ((cur + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-options').innerHTML = q.opts.map((o, i) =>
    `<button class="option-btn" onclick="answer(${i})">${o}</button>`
  ).join('');
}

function answer(idx) {
  if (cur === 0) scores.space += idx;
  if (cur === 1) scores.space += idx;
  if (cur === 2) scores.stuff += (3 - idx);
  if (cur === 3) { if (idx === 0 || idx === 3) scores.stuff++; else scores.space--; }
  if (cur === 4) scores.space += idx;
  cur++;
  if (cur >= QUESTIONS.length) { showResult(); return; }
  renderQ();
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  let key;
  if (scores.stuff >= 4) {
    key = 'declutter';
  } else if (scores.space <= 1) {
    key = 'organize';
  } else if (scores.space <= 3) {
    key = 'vertical';
  } else {
    key = 'systemize';
  }
  lastResultKey = key;
  saveHistory(key);
  const r = RESULTS[key];
  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-desc').textContent = r.desc;
  document.getElementById('r-tips').innerHTML = r.tips.map(t => `<div class="tip-box">${t}</div>`).join('');
  document.getElementById('r-next-steps').innerHTML = '<div style="font-size:13px;font-weight:600;color:#D97706;margin-bottom:8px;">🎯 次のステップ</div>' + r.nextSteps.map(s => `<div class="tip-box">${s}</div>`).join('');
  document.getElementById('r-affiliates').innerHTML = '<div class="affiliate-section"><div class="affiliate-title">🛍️ おすすめ商品</div>' + r.affiliates.map(a => `<a href="${a.url}" target="_blank" class="affiliate-link">${a.name}</a>`).join('') + '</div>';
  document.getElementById('result').classList.add('show');
}

function shareTwitter() {
  if (!lastResultKey) return;
  const r = RESULTS[lastResultKey];
  const text = `📦 「収納スペース最適化診断」の結果：${r.emoji} ${r.title}
無料で診断してみてください！`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(location.href)}`;
  window.open(url, '_blank');
}

function shareLine() {
  if (!lastResultKey) return;
  const r = RESULTS[lastResultKey];
  const text = `📦 「収納スペース最適化診断」の結果：${r.emoji} ${r.title}
無料で診断してみてください！
${location.href}`;
  const url = `https://line.me/R/msg/text/${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

function resetQuiz() {
  document.getElementById('quiz-start').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result').classList.remove('show');
  cur = 0;
  scores = { space: 0, stuff: 0 };
  lastResultKey = null;
}

initOnLoad();
    </script>
