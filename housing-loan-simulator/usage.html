<h1>📋 使い方</h1><h2>基本計算タブ</h2><p>借入金額・返済期間・金利・返済方式を選ぶだけで月々の返済額と総利息が自動計算されます。</p><h2>繰上返済タブ</h2><p>繰り上げ返済のタイミング・金額・方式を選ぶと利息削減額・期間短縮効果がわかります。</p><h2>金利変動タブ</h2><p>変動金利が上昇した場合の月々返済額への影響をシミュレーションできます。</p><h2>適正診断タブ</h2><p>年収・物件価格・頭金を入力すると借入の適正水準（年収倍率・返済負担率）を診断します。</p>
