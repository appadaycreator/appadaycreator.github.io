<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持ち物管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c1220;
  --card: #1a2840;
  --card2: #1e2e48;
  --border: #3a5070;
  --text: #e8edf5;
  --muted: #8a9fbf;
  --teal: #2dd4bf;
  --orange: #fb923c;
  --purple: #a78bfa;
  --green: #4ade80;
  --blue: #60a5fa;
  --red: #f87171;
  --yellow: #fbbf24;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── Login ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 28px;
  width: 100%; max-width: 340px; text-align: center;
}
.login-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-box p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 12px 16px;
  background: #0f1623; border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px;
  outline: none; margin-bottom: 12px; transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--teal); }
.login-box button {
  width: 100%; padding: 13px;
  background: var(--teal); color: #0f2825;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
.login-err { font-size: 13px; color: var(--red); margin-top: 10px; display: none; }

/* ── App ── */
#app { display: none; max-width: 640px; margin: 0 auto; padding: 16px; }

/* Header */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.app-header h1 { font-size: 18px; font-weight: 700; }
.header-btns { display: flex; gap: 8px; }
.hub-btn, .logout-btn {
  font-size: 12px; color: var(--muted);
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  text-decoration: none; cursor: pointer;
}

/* Search bar */
.search-wrap {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.search-input {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px;
  padding: 10px 14px; outline: none;
}
.search-input:focus { border-color: var(--teal); }
.add-btn {
  background: var(--teal); color: #0f2825;
  border: none; border-radius: 10px;
  padding: 10px 18px; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}

/* Filter chips */
.filter-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
}
.filter-chip {
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); font-size: 12px; cursor: pointer;
}
.filter-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 16px; margin-bottom: 14px;
  font-size: 12px; color: var(--muted);
}
.stat-num { font-weight: 700; color: var(--text); }

/* Item grid */
.item-grid {
  display: flex; flex-direction: column; gap: 8px;
}

/* Item card */
.item-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 12px;
  transition: border-color 0.15s;
}
.item-card:hover { border-color: var(--blue); }
.item-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--card2); display: flex; align-items: center;
  justify-content: center; font-size: 20px; flex-shrink: 0;
}
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.item-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.meta-tag {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: #1e3050; color: var(--muted);
}
.meta-location { color: var(--orange); }
.meta-category { color: var(--purple); }
.item-note { font-size: 12px; color: var(--muted); line-height: 1.5; }
.item-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.action-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; color: var(--muted); font-size: 11px;
  padding: 4px 8px; cursor: pointer; white-space: nowrap;
}
.action-btn:hover { color: var(--text); border-color: var(--text); }
.action-btn.del:hover { color: var(--red); border-color: var(--red); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; z-index: 100;
}
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 24px;
  width: 100%; max-width: 480px; max-height: 90vh;
  overflow-y: auto;
}
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; background: #0f1623; border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  padding: 9px 12px; outline: none;
}
.form-input:focus { border-color: var(--teal); }
.form-select {
  width: 100%; background: #0f1623; border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  padding: 9px 12px; outline: none; appearance: none;
}
.form-textarea {
  width: 100%; background: #0f1623; border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  padding: 9px 12px; outline: none; resize: none; font-family: inherit;
}
.form-textarea:focus, .form-select:focus { border-color: var(--teal); }

/* Icon picker */
.icon-picker { display: flex; flex-wrap: wrap; gap: 6px; }
.icon-opt {
  width: 38px; height: 38px; border-radius: 8px;
  background: var(--card2); border: 2px solid transparent;
  font-size: 18px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: border-color 0.15s;
}
.icon-opt.selected { border-color: var(--teal); }

/* Modal buttons */
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.btn-primary {
  flex: 1; padding: 12px; background: var(--teal);
  color: #0f2825; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-cancel {
  padding: 12px 20px; background: none;
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); font-size: 14px; cursor: pointer;
}

/* Empty state */
.empty { text-align: center; padding: 48px 16px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Location manager */
.loc-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.loc-item {
  display: flex; align-items: center; gap: 4px;
  background: #1e3050; border-radius: 20px; padding: 4px 8px 4px 12px;
  font-size: 12px;
}
.loc-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; }
.loc-del:hover { color: var(--red); }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>📦 持ち物管理</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが違います</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <h1>📦 持ち物管理</h1>
    <div class="header-btns">
      <a class="hub-btn" href="https://appadaycreator.com/my-hub/?p=techbrace2026">🏠 マイツール</a>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍 名前・メモで検索..." oninput="render()">
    <button class="add-btn" onclick="openAddModal()">＋ 追加</button>
  </div>

  <div class="filter-row" id="cat-filters"></div>
  <div class="filter-row" id="loc-filters"></div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="item-grid" id="item-grid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">持ち物を追加</h2>
    <div class="form-group">
      <label class="form-label">アイコン</label>
      <div class="icon-picker" id="icon-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">名前 *</label>
      <input class="form-input" id="f-name" placeholder="例: MacBook Pro">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="f-category">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">保管場所</label>
      <select class="form-select" id="f-location">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">タグ（スペース区切り）</label>
      <input class="form-input" id="f-tags" placeholder="例: 仕事 重要 充電器">
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="f-note" rows="3" placeholder="シリアル番号・購入日・特記事項など"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveItem()">保存</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>⚙️ 設定</h2>
    <div class="form-group">
      <label class="form-label">カテゴリ管理</label>
      <div class="loc-list" id="cat-list"></div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="cat-new" placeholder="カテゴリを追加..." style="flex:1">
        <button class="add-btn" style="padding:9px 14px;font-size:13px" onclick="addCategory()">追加</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">場所管理</label>
      <div class="loc-list" id="loc-list"></div>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="loc-new" placeholder="場所を追加..." style="flex:1">
        <button class="add-btn" style="padding:9px 14px;font-size:13px" onclick="addLocation()">追加</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="closeSettings()">閉じる</button>
    </div>
  </div>
</div>

<script>
const PASSWORD    = 'techbrace2026';
const SESSION_KEY = 'items_auth';
const ITEMS_KEY   = 'items_data';
const CATS_KEY    = 'items_cats';
const LOCS_KEY    = 'items_locs';

const DEFAULT_CATS = ['電子機器','衣類','書類・本','日用品','工具','スポーツ','食品・飲料','おもちゃ','趣味','その他'];
const DEFAULT_LOCS = ['リビング','寝室','子供部屋','キッチン','クローゼット','玄関','書斎','倉庫','車','外出中'];
const ICONS = ['📦','💻','📱','⌨️','🖥️','🎧','📷','🔌','👕','👔','👗','👟','🧳','📚','📋','🔧','🔨','⚙️','🧴','💊','🧸','🎮','🏃','🎵','🍳','🔑','💼','🎒','🛠️','📡','🪜','🏠','🚗','🌱','💡','🎨','🏋️','🧹','📦'];

// ── Auth ──────────────────────────────────────────────────────────────────────
(function() {
  const p = new URLSearchParams(location.search).get('p');
  if (p === PASSWORD) { sessionStorage.setItem(SESSION_KEY, '1'); history.replaceState({}, '', location.pathname); }
})();
if (sessionStorage.getItem(SESSION_KEY)) showApp();

function doLogin() {
  if (document.getElementById('pw').value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1'); showApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw').value = ''; document.getElementById('pw').focus();
  }
}
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

// ── Data ──────────────────────────────────────────────────────────────────────
function getItems()   { return JSON.parse(localStorage.getItem(ITEMS_KEY) || '[]'); }
function getCats()    { return JSON.parse(localStorage.getItem(CATS_KEY)  || JSON.stringify(DEFAULT_CATS)); }
function getLocs()    { return JSON.parse(localStorage.getItem(LOCS_KEY)  || JSON.stringify(DEFAULT_LOCS)); }
function saveItems(d) { localStorage.setItem(ITEMS_KEY, JSON.stringify(d)); }
function saveCats(d)  { localStorage.setItem(CATS_KEY,  JSON.stringify(d)); }
function saveLocs(d)  { localStorage.setItem(LOCS_KEY,  JSON.stringify(d)); }

// ── State ─────────────────────────────────────────────────────────────────────
let activeCat = '';
let activeLoc = '';
let editingId = null;
let selectedIcon = ICONS[0];

// ── Init ──────────────────────────────────────────────────────────────────────
function initApp() {
  buildIconPicker();
  renderFilterChips();
  render();
}

function renderFilterChips() {
  // Category chips
  const catEl = document.getElementById('cat-filters');
  catEl.innerHTML = '';
  const allCatBtn = document.createElement('button');
  allCatBtn.className = 'filter-chip' + (!activeCat ? ' active' : '');
  allCatBtn.textContent = 'すべて';
  allCatBtn.onclick = () => { activeCat = ''; renderFilterChips(); render(); };
  catEl.appendChild(allCatBtn);
  getCats().forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeCat === c ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => { activeCat = activeCat === c ? '' : c; renderFilterChips(); render(); };
    catEl.appendChild(btn);
  });

  // Settings cog
  const gear = document.createElement('button');
  gear.className = 'filter-chip';
  gear.textContent = '⚙️ 設定';
  gear.onclick = openSettings;
  catEl.appendChild(gear);

  // Location chips
  const locEl = document.getElementById('loc-filters');
  locEl.innerHTML = '';
  const allLocBtn = document.createElement('button');
  allLocBtn.className = 'filter-chip' + (!activeLoc ? ' active' : '');
  allLocBtn.textContent = '📍 全場所';
  allLocBtn.onclick = () => { activeLoc = ''; renderFilterChips(); render(); };
  locEl.appendChild(allLocBtn);
  getLocs().forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeLoc === l ? ' active' : '');
    btn.textContent = l;
    btn.onclick = () => { activeLoc = activeLoc === l ? '' : l; renderFilterChips(); render(); };
    locEl.appendChild(btn);
  });
}

function render() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  const items = getItems();
  const filtered = items.filter(item => {
    if (activeCat && item.category !== activeCat) return false;
    if (activeLoc && item.location !== activeLoc) return false;
    if (query) {
      const haystack = [item.name, item.note, ...(item.tags || [])].join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });

  // Stats
  const statsEl = document.getElementById('stats-bar');
  statsEl.innerHTML = `
    <span>全<span class="stat-num">${items.length}</span>件</span>
    <span>表示中<span class="stat-num">${filtered.length}</span>件</span>
  `;

  // Grid
  const grid = document.getElementById('item-grid');
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>${query ? '検索結果なし' : 'まだ持ち物が登録されていません'}</div>`;
    return;
  }

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    const tags = (item.tags || []).map(t => `<span class="meta-tag">#${t}</span>`).join('');
    card.innerHTML = `
      <div class="item-icon">${item.icon || '📦'}</div>
      <div class="item-body">
        <div class="item-name">${escHtml(item.name)}</div>
        <div class="item-meta">
          ${item.category ? `<span class="meta-tag meta-category">🏷 ${escHtml(item.category)}</span>` : ''}
          ${item.location ? `<span class="meta-tag meta-location">📍 ${escHtml(item.location)}</span>` : ''}
          ${tags}
        </div>
        ${item.note ? `<div class="item-note">${escHtml(item.note)}</div>` : ''}
      </div>
      <div class="item-actions">
        <button class="action-btn" onclick="openEditModal('${item.id}')">編集</button>
        <button class="action-btn del" onclick="deleteItem('${item.id}')">削除</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function buildIconPicker() {
  const el = document.getElementById('icon-picker');
  el.innerHTML = '';
  ICONS.forEach(icon => {
    const btn = document.createElement('button');
    btn.className = 'icon-opt' + (icon === selectedIcon ? ' selected' : '');
    btn.textContent = icon;
    btn.onclick = () => {
      selectedIcon = icon;
      document.querySelectorAll('.icon-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    el.appendChild(btn);
  });
}

function populateSelects() {
  const catSel = document.getElementById('f-category');
  const locSel = document.getElementById('f-location');
  const savedCat = catSel.value;
  const savedLoc = locSel.value;
  catSel.innerHTML = '<option value="">カテゴリなし</option>' + getCats().map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
  locSel.innerHTML = '<option value="">場所なし</option>' + getLocs().map(l => `<option value="${escHtml(l)}">${escHtml(l)}</option>`).join('');
  catSel.value = savedCat;
  locSel.value = savedLoc;
}

function openAddModal() {
  editingId = null;
  selectedIcon = ICONS[0];
  buildIconPicker();
  populateSelects();
  document.getElementById('modal-title').textContent = '持ち物を追加';
  document.getElementById('f-name').value = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function openEditModal(id) {
  const item = getItems().find(i => i.id === id);
  if (!item) return;
  editingId = id;
  selectedIcon = item.icon || ICONS[0];
  buildIconPicker();
  populateSelects();
  document.getElementById('modal-title').textContent = '持ち物を編集';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-category').value = item.category || '';
  document.getElementById('f-location').value = item.location || '';
  document.getElementById('f-tags').value = (item.tags || []).join(' ');
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const tags = document.getElementById('f-tags').value.trim().split(/\s+/).filter(Boolean);
  const newItem = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    icon: selectedIcon,
    name,
    category: document.getElementById('f-category').value,
    location: document.getElementById('f-location').value,
    tags,
    note: document.getElementById('f-note').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  let items = getItems();
  if (editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    if (idx >= 0) { newItem.createdAt = items[idx].createdAt; items[idx] = newItem; }
  } else {
    newItem.createdAt = newItem.updatedAt;
    items.unshift(newItem);
  }
  saveItems(items);
  closeModal();
  render();
}

function deleteItem(id) {
  if (!confirm('削除しますか？')) return;
  saveItems(getItems().filter(i => i.id !== id));
  render();
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings() {
  renderSettingsLists();
  document.getElementById('settings-modal').style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
  renderFilterChips();
  populateSelects();
  render();
}

function renderSettingsLists() {
  // Categories
  const catListEl = document.getElementById('cat-list');
  catListEl.innerHTML = '';
  getCats().forEach(c => {
    const div = document.createElement('div');
    div.className = 'loc-item';
    div.innerHTML = `${escHtml(c)}<button class="loc-del" onclick="removeCat('${escHtml(c)}')">×</button>`;
    catListEl.appendChild(div);
  });
  // Locations
  const locListEl = document.getElementById('loc-list');
  locListEl.innerHTML = '';
  getLocs().forEach(l => {
    const div = document.createElement('div');
    div.className = 'loc-item';
    div.innerHTML = `${escHtml(l)}<button class="loc-del" onclick="removeLoc('${escHtml(l)}')">×</button>`;
    locListEl.appendChild(div);
  });
}

function addCategory() {
  const val = document.getElementById('cat-new').value.trim();
  if (!val) return;
  const cats = getCats();
  if (!cats.includes(val)) { cats.push(val); saveCats(cats); }
  document.getElementById('cat-new').value = '';
  renderSettingsLists();
}
function removeCat(c) {
  saveCats(getCats().filter(x => x !== c));
  renderSettingsLists();
}
function addLocation() {
  const val = document.getElementById('loc-new').value.trim();
  if (!val) return;
  const locs = getLocs();
  if (!locs.includes(val)) { locs.push(val); saveLocs(locs); }
  document.getElementById('loc-new').value = '';
  renderSettingsLists();
}
function removeLoc(l) {
  saveLocs(getLocs().filter(x => x !== l));
  renderSettingsLists();
}
</script>
</body>
</html>
