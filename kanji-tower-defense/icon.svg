<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#7c3aed"/>
  <!-- 城の土台 -->
  <rect x="120" y="300" width="272" height="140" rx="8" fill="#fbbf24"/>
  <!-- 城の門 -->
  <rect x="216" y="360" width="80" height="80" rx="8" fill="#92400e"/>
  <!-- 城の塔（左） -->
  <rect x="104" y="240" width="72" height="80" fill="#f59e0b"/>
  <rect x="96" y="220" width="88" height="28" rx="4" fill="#fbbf24"/>
  <!-- 城の塔（右） -->
  <rect x="336" y="240" width="72" height="80" fill="#f59e0b"/>
  <rect x="328" y="220" width="88" height="28" rx="4" fill="#fbbf24"/>
  <!-- 城の本体 -->
  <rect x="160" y="260" width="192" height="60" fill="#fbbf24"/>
  <rect x="152" y="240" width="208" height="28" rx="4" fill="#fde68a"/>
  <!-- 漢字テキスト -->
  <text x="256" y="190" text-anchor="middle" font-family="serif" font-size="80" font-weight="bold" fill="white">漢</text>
  <!-- 装飾：旗 -->
  <rect x="136" y="140" width="6" height="80" fill="#1e40af"/>
  <polygon points="142,140 180,160 142,180" fill="#ef4444"/>
  <rect x="370" y="140" width="6" height="80" fill="#1e40af"/>
  <polygon points="376,140 338,160 376,180" fill="#ef4444"/>
</svg>
