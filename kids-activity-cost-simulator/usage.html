<h1>🎯 使い方</h1>
<h2>STEP 1: 年齢を選ぶ</h2><p>スライダーでお子様の現在の年齢を選択してください（0〜18歳）。年齢に合わせたおすすめ習い事のヒントが表示されます。</p>
<h2>STEP 2: 習い事を選ぶ</h2><p>カテゴリータブで絞り込み、気になる習い事をクリックしてください。複数選択することができます。</p>
<h2>STEP 3: 費用を確認</h2><p>選んだ習い事の月謝・入会金・年間費用の相場が自動計算されます。複数選んだ場合は合計費用も表示されます。</p>
<h2>注意事項</h2><p>表示される費用は全国平均の参考値です。実際の月謝・入会金は教室・地域によって異なります。必ず各スクールの公式サイトでご確認ください。</p>
