    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <meta name="theme-color" content="#6366f1">
    <title>お問い合わせ - MediBook</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root { --medical-blue: #3373dc; }
        .medical-gradient { background: linear-gradient(135deg, var(--medical-blue) 0%, #60a5fa 100%); }
        .medical-input {
            border: 2px solid #e5e7eb;
            transition: all 0.3s ease;
        }
        .medical-input:focus {
            border-color: var(--medical-blue);
            box-shadow: 0 0 0 3px rgba(51, 115, 220, 0.1);
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-32">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TXQGZRF9"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <div id="common-header"></div>
    <script src="header.js"></script>
    <div class="mt-16 container mx-auto px-4 py-8">
        <button onclick="history.back()" class="mb-4 px-4 py-2 bg-blue-500 text-white rounded">戻る</button>
        <h1 class="text-2xl font-bold mb-4 text-center">お問い合わせ</h1>
        <form id="contactForm" class="space-y-4">
            <div>
                <label for="name" class="block font-semibold">お名前</label>
                <input type="text" id="name" name="name" class="medical-input w-full p-2 rounded" required>
            </div>
            <div>
                <label for="email" class="block font-semibold">メールアドレス</label>
                <input type="email" id="email" name="email" class="medical-input w-full p-2 rounded" required>
            </div>
            <div>
                <label for="message" class="block font-semibold">お問い合わせ内容</label>
                <textarea id="message" name="message" class="medical-input w-full p-2 rounded" required></textarea>
            </div>
            <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded">送信</button>
        </form>
        <div class="mt-8 text-center space-x-4">
            <a href="index.html" class="text-blue-600 hover:underline">トップページ</a>
            <a href="privacy.html" class="text-blue-600 hover:underline">プライバシーポリシー</a>
            <a href="disclaimers.html" class="text-blue-600 hover:underline">免責事項</a>
            <a href="terms.html" class="text-blue-600 hover:underline">利用規約</a>
            <a href="usage.html" class="text-blue-600 hover:underline">使い方</a>
        </div>
    </div>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('お問い合わせありがとうございます。内容を確認次第、ご連絡させていただきます。');
        });
    </script>
    <div id="common-footer"></div>
    <script>
        fetch('footer.html')
          .then(res => res.text())
          .then(html => {
            document.getElementById('common-footer').innerHTML = html;
          });
    </script>
</body>
</html>
