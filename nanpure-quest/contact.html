<body>

  <header>
    <h1>お問い合わせ</h1>
    <nav>
      <a href="index.html">ゲーム</a>
      <a href="lp.html">ホーム</a>
      <a href="usage.html">使い方</a>
    </nav>
  </header>
  <main>
    <form id="contact-form" autocomplete="on" novalidate>
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required placeholder="例: 山田太郎" aria-label="お名前" aria-describedby="name-error">
      <span id="name-error" class="error-message" style="display:none;color:#ef4444;font-size:0.9rem;margin-top:4px;">＊ お名前は必須項目です</span>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="example@example.com" aria-label="メールアドレス" aria-describedby="email-error">
      <span id="email-error" class="error-message" style="display:none;color:#ef4444;font-size:0.9rem;margin-top:4px;">＊ メールアドレスの形式が正しくありません</span>

      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" rows="5" required placeholder="お問い合わせ内容をご入力ください" aria-label="お問い合わせ内容" aria-describedby="message-error"></textarea>
      <span id="message-error" class="error-message" style="display:none;color:#ef4444;font-size:0.9rem;margin-top:4px;">＊ お問い合わせ内容は必須項目です</span>

      <button type="submit">送信</button>
      <p id="form-result"></p>
    </form>
    <script>
      const form = document.getElementById('contact-form');
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const messageInput = document.getElementById('message');
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function validateField(field, errorEl, isValid) {
        if (isValid) {
          errorEl.style.display = 'none';
          field.style.borderColor = '';
        } else {
          errorEl.style.display = '';
          field.style.borderColor = '#ef4444';
        }
      }

      nameInput.addEventListener('blur', () => {
        const isValid = nameInput.value.trim() !== '';
        validateField(nameInput, document.getElementById('name-error'), isValid);
      });

      emailInput.addEventListener('blur', () => {
        const isValid = emailInput.value.trim() === '' || emailRegex.test(emailInput.value);
        if (!isValid) document.getElementById('email-error').textContent = '＊ メールアドレスの形式が正しくありません';
        validateField(emailInput, document.getElementById('email-error'), isValid);
      });

      messageInput.addEventListener('blur', () => {
        const isValid = messageInput.value.trim() !== '';
        validateField(messageInput, document.getElementById('message-error'), isValid);
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const nameValid = nameInput.value.trim() !== '';
        const emailValid = emailInput.value.trim() === '' ? false : emailRegex.test(emailInput.value);
        const messageValid = messageInput.value.trim() !== '';

        validateField(nameInput, document.getElementById('name-error'), nameValid);
        validateField(emailInput, document.getElementById('email-error'), emailValid);
        validateField(messageInput, document.getElementById('message-error'), messageValid);

        if (nameValid && emailValid && messageValid) {
          document.getElementById('form-result').textContent = '送信が完了しました（ダミー）';
          document.getElementById('form-result').style.color = '#10b981';
          this.reset();
        }
      });
    </script>
  </main>
