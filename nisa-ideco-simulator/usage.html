<h1>📋 使い方</h1><h2>NISAタブ</h2><p>月積立額・年利・期間を設定するだけで将来の資産額を自動計算。生涯投資枠の活用状況もグラフで確認できます。</p><h2>iDeCoタブ</h2><p>職業・年収・拠出額を選ぶと年間節税額と運用資産が計算されます。上限額は職業に応じて自動設定されます。</p><h2>比較タブ</h2><p>新NISAとiDeCoの特徴を一覧比較。年利別のシミュレーション結果も確認できます。</p><h2>注意事項</h2><p>計算結果は概算です。実際の運用成果・税額は証券会社・税理士にご確認ください。</p>
