<!-- End Google Tag Manager (noscript) --><h1>使い方</h1><h2>ペース計算</h2><ol><li>距離を選択（プリセットボタンまたは手入力）</li><li>目標タイム（時間・分・秒）を入力</li><li>「ペースを計算する」をクリック</li></ol><h2>タイム計算</h2><p>1kmのペース（分・秒）を入力すると完走タイムが計算できます。</p><h2>カロリー計算</h2><p>体重・距離・ペースを入力して消費カロリーと脂肪燃焼量を計算できます。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
