        <h1>💬 お問い合わせ</h1>
        <p>ご意見・ご要望・不具合報告やご質問がありましたら、以下のフォームからお気軽にお問い合わせください。</p>

        <div id="successMsg" class="form-message success">✅ お問い合わせありがとうございます。確認いたします。</div>
        <div id="errorMsg" class="form-message error">❌ 送信に失敗しました。もう一度お試しください。</div>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">お名前 <span style="color:#ff6b6b;">*</span></label>
                <input type="text" id="name" name="name" placeholder="例：田中太郎" required>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス <span style="color:#ff6b6b;">*</span></label>
                <input type="email" id="email" name="email" placeholder="例：user@example.com" required>
            </div>

            <div class="form-group">
                <label for="subject">件名</label>
                <input type="text" id="subject" name="subject" placeholder="例：○○について">
            </div>

            <div class="form-group">
                <label for="message">メッセージ <span style="color:#ff6b6b;">*</span></label>
                <textarea id="message" name="message" placeholder="ご意見・ご要望などをご記入ください" required></textarea>
            </div>

            <button type="submit" class="btn">送信する</button>
            <p class="note">送信に際してプライバシーポリシーに同意するものとします。</p>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const message = document.getElementById('message').value.trim();

        // バリデーション
        if (!name) {
            errorMsg.textContent = '❌ お名前を入力してください';
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            return;
        }
        if (!email || !email.includes('@')) {
            errorMsg.textContent = '❌ 有効なメールアドレスを入力してください';
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            return;
        }
        if (!message) {
            errorMsg.textContent = '❌ メッセージを入力してください';
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            return;
        }

        try {
            // FormSubmit.co を使用してメール送信
            const response = await fetch('https://formspree.io/f/mjoverjy', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';
                form.reset();
                // 3秒後にメッセージを非表示
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            } else {
                errorMsg.textContent = '❌ 送信に失敗しました。もう一度お試しください。';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            }
        } catch (error) {
            console.error('Error:', error);
            errorMsg.textContent = '❌ 送信に失敗しました。インターネット接続を確認してください。';
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }
    });
</script>
