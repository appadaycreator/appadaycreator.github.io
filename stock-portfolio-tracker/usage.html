<h1>📋 使い方</h1><h2>保有株タブ</h2><p>登録した銘柄の一覧と総含み損益・配当サマリーを確認できます。フィルターやソートで表示を絞れます。</p><h2>銘柄追加タブ</h2><p>銘柄名・取得価格・保有数量・現在値を入力して保存。現在値は一括更新機能でまとめて更新できます。</p><h2>分析タブ</h2><p>セクター別・銘柄別のポートフォリオ構成比バーグラフと配当金サマリーが表示されます。</p><h2>データ管理</h2><p>CSVエクスポートで手元にバックアップを取ることをお勧めします。データはブラウザのLocalStorageに保存されます。</p>
