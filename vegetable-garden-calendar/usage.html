<!-- End Google Tag Manager (noscript) --><h1>家庭菜園カレンダーの使い方</h1><h2>基本的な使い方</h2><ol><li>「今月の作業」セクションで今月種まき・収穫できる野菜を確認</li><li>カテゴリーボタン（果菜類・葉菜類・根菜類・ハーブ）でフィルタリング</li><li>野菜名で検索して特定の野菜のスケジュールを確認</li><li>⭐ボタンでお気に入りに追加（ブラウザに保存されます）</li></ol><h2>カレンダーの見方</h2><p>緑：種まき期、黄緑：植え付け期、オレンジ：収穫期を示しています。</p><p><a href="index.html">← トップへ戻る</a></p></body></html>
