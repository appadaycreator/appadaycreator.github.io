</head>
<body>

height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
    <div class="floating-hearts">
        <i class="fas fa-heart heart" style="left: 10%; animation-delay: 0s; font-size: 20px;"></i>
        <i class="fas fa-heart heart" style="left: 20%; animation-delay: 1s; font-size: 16px;"></i>
        <i class="fas fa-heart heart" style="left: 30%; animation-delay: 2s; font-size: 24px;"></i>
        <i class="fas fa-heart heart" style="left: 40%; animation-delay: 3s; font-size: 18px;"></i>
        <i class="fas fa-heart heart" style="left: 50%; animation-delay: 4s; font-size: 22px;"></i>
        <i class="fas fa-heart heart" style="left: 60%; animation-delay: 5s; font-size: 16px;"></i>
        <i class="fas fa-heart heart" style="left: 70%; animation-delay: 1.5s; font-size: 20px;"></i>
        <i class="fas fa-heart heart" style="left: 80%; animation-delay: 2.5s; font-size: 18px;"></i>
        <i class="fas fa-heart heart" style="left: 90%; animation-delay: 3.5s; font-size: 24px;"></i>
    </div>
    <!-- ヘッダー -->
    <header class="glass-card mx-4 mt-4 rounded-xl p-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <i class="fas fa-rings-wedding text-3xl mr-3" style="color: var(--rose-gold);"></i>
                <h1 class="klee-font text-2xl font-bold" style="color: var(--text-dark);">
                    結婚式費用計算機
                </h1>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="index.html#calculator" class="text-gray-600 hover:text-pink-400 transition-colors">計算機</a>
                <a href="index.html#tips" class="text-gray-600 hover:text-pink-400 transition-colors">節約のコツ</a>
                <a href="contact.html" class="text-gray-600 hover:text-pink-400 transition-colors">お問い合わせ</a>
            </nav>
        </div>
    </header>
    <main class="container mx-auto px-4 py-8">
        <div class="glass-card rounded-2xl p-8">
            <h2 class="klee-font text-3xl font-bold mb-6" style="color: var(--text-dark);">お問い合わせフォーム</h2>
            <div id="formError" class="mb-4 p-3 rounded-lg bg-red-50 border border-red-300 text-red-700 text-sm hidden"></div>
            <div id="formSuccess" class="mb-4 p-3 rounded-lg bg-green-50 border border-green-300 text-green-700 text-sm hidden"></div>
            <form id="contact-form" class="space-y-4" onsubmit="validateAndSubmit(event)">
                <div>
                    <label for="name" class="block mb-1">お名前（必須）</label>
                    <input type="text" id="name" name="name" required class="form-input w-full" placeholder="例：山田太郎" aria-label="お名前を入力（必須）">
                    <p class="text-xs mt-1 text-red-600 hidden" id="nameError"></p>
                </div>
                <div>
                    <label for="email" class="block mb-1">メールアドレス（必須）</label>
                    <input type="email" id="email" name="email" required class="form-input w-full" placeholder="例：example@example.com" aria-label="メールアドレスを入力（例：example@example.com）">
                    <p class="text-xs mt-1 text-red-600 hidden" id="emailError"></p>
                </div>
                <div>
                    <label for="subject" class="block mb-1">件名（必須）</label>
                    <input type="text" id="subject" name="subject" required class="form-input w-full" placeholder="例：計算結果について" aria-label="件名を入力（例：計算結果について）">
                    <p class="text-xs mt-1 text-red-600 hidden" id="subjectError"></p>
                </div>
                <div>
                    <label for="message" class="block mb-1">お問い合わせ内容（必須）</label>
                    <textarea id="message" name="message" rows="6" required class="form-input w-full" placeholder="例：計算結果について質問があります。&#10;ご返信よろしくお願いします。" aria-label="お問い合わせ内容を入力（必須）"></textarea>
                    <p class="text-xs mt-1 text-red-600 hidden" id="messageError"></p>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn-primary">送信する</button>
                </div>
            </form>
        </div>
    </main>
    <!-- フッター -->
    <footer class="glass-card mx-4 mb-4 rounded-xl p-6">
        <div class="text-center">
            <div class="flex justify-center space-x-6 mb-4">
                <a href="usage.html" class="text-gray-600 hover:text-pink-400 transition-colors">使い方</a>
                <a href="privacy.html" class="text-gray-600 hover:text-pink-400 transition-colors">プライバシーポリシー</a>
                <a href="disclaimer.html" class="text-gray-600 hover:text-pink-400 transition-colors">免責事項</a>
                <a href="contact.html" class="text-gray-600 hover:text-pink-400 transition-colors">お問い合わせ</a>
            </div>
            <p class="text-sm" style="color: var(--text-soft);">
                © 2026 結婚式費用計算機. All rights reserved.
            </p>
            <p class="text-xs mt-2" style="color: var(--text-soft);">
                このツールで計算された金額は参考値です。実際の費用は会場や時期により異なります。
            </p>
        </div>
    </footer>
<script>
function validateAndSubmit(e) {
    e.preventDefault();
    const formError = document.getElementById('formError');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const subjectInput = document.getElementById('subject');
    const messageInput = document.getElementById('message');

    // エラーメッセージをクリア
    formError.textContent = '';
    formError.classList.add('hidden');
    document.querySelectorAll('[id$="Error"]').forEach(el => el.classList.add('hidden'));

    // エラー状態をリセット
    [nameInput, emailInput, subjectInput, messageInput].forEach(el => {
        el.classList.remove('has-error');
        el.setAttribute('aria-invalid', 'false');
    });

    let hasError = false;

    // 名前チェック
    if (!nameInput.value.trim()) {
        document.getElementById('nameError').textContent = 'お名前を入力してください';
        document.getElementById('nameError').classList.remove('hidden');
        nameInput.classList.add('has-error');
        nameInput.setAttribute('aria-invalid', 'true');
        hasError = true;
    }

    // メールアドレスチェック
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailInput.value.trim()) {
        document.getElementById('emailError').textContent = 'メールアドレスを入力してください';
        document.getElementById('emailError').classList.remove('hidden');
        emailInput.classList.add('has-error');
        emailInput.setAttribute('aria-invalid', 'true');
        hasError = true;
    } else if (!emailRegex.test(emailInput.value)) {
        document.getElementById('emailError').textContent = '有効なメールアドレスを入力してください（例：example@example.com）';
        document.getElementById('emailError').classList.remove('hidden');
        emailInput.classList.add('has-error');
        emailInput.setAttribute('aria-invalid', 'true');
        hasError = true;
    }

    // 件名チェック
    if (!subjectInput.value.trim()) {
        document.getElementById('subjectError').textContent = '件名を入力してください';
        document.getElementById('subjectError').classList.remove('hidden');
        subjectInput.classList.add('has-error');
        subjectInput.setAttribute('aria-invalid', 'true');
        hasError = true;
    }

    // 本文チェック
    if (!messageInput.value.trim()) {
        document.getElementById('messageError').textContent = 'お問い合わせ内容を入力してください';
        document.getElementById('messageError').classList.remove('hidden');
        messageInput.classList.add('has-error');
        messageInput.setAttribute('aria-invalid', 'true');
        hasError = true;
    }

    if (hasError) {
        formError.textContent = '⚠️ 入力エラーがあります。上記をご確認の上、再度お試しください。';
        formError.classList.remove('hidden');
        formError.setAttribute('role', 'alert');
        return;
    }

    // 成功メッセージ表示
    const successMsg = document.getElementById('formSuccess');
    successMsg.textContent = '✅ お問い合わせありがとうございます。内容を確認次第、ご連絡させていただきます。';
    successMsg.classList.remove('hidden');
    successMsg.setAttribute('role', 'alert');
    document.getElementById('contact-form').reset();
    setTimeout(() => {
        successMsg.classList.add('hidden');
    }, 4000);
}
</script>
</body>
</html>
